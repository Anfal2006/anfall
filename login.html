<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Prestige Motors</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-background video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0.4;
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.85) 0%,
                rgba(0, 0, 0, 0.75) 50%,
                rgba(0, 0, 0, 0.9) 100%
            );
            z-index: -1;
        }

        .fallback-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%);
            z-index: -2;
        }

        .smoke-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 50%, rgba(100,100,255,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 30%, rgba(0,100,200,0.06) 0%, transparent 50%);
            animation: smokeFloat 15s ease-in-out infinite;
        }

        @keyframes smokeFloat {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            33% { transform: translate(50px, -30px) scale(1.1); opacity: 0.8; }
            66% { transform: translate(-30px, 40px) scale(0.9); opacity: 0.6; }
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            letter-spacing: 5px;
            font-weight: 400;
            color: #fff;
        }

        .logo span {
            color: #0066b1;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            transition: all 0.3s;
            font-weight: 300;
        }

        .nav-links a:hover {
            color: #0066b1;
        }

        /* Login Container */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px;
        }

        .login-box {
            width: 100%;
            max-width: 500px;
            padding: 60px 50px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards 0.3s;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .login-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            letter-spacing: 6px;
            margin-bottom: 15px;
            font-weight: 400;
        }

        .login-header p {
            font-size: 16px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0066b1;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 102, 177, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #0066b1;
            border-color: #0066b1;
            box-shadow: 0 0 30px rgba(0, 102, 177, 0.4);
        }

        .divider {
            text-align: center;
            margin: 35px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
        }

        .divider span {
            background: transparent;
            padding: 0 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .register-link {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .register-link a {
            color: #0066b1;
            text-decoration: none;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .register-link a:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* Loader */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s, visibility 0.8s;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-text {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            letter-spacing: 10px;
            animation: loaderPulse 1.5s infinite;
        }

        @keyframes loaderPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 20px 25px;
            }

            .nav-links {
                gap: 20px;
            }

            .login-box {
                padding: 40px 30px;
            }

            .login-header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loader" id="loader">
        <div class="loader-text">PRESTIGE MOTORS</div>
    </div>

    <!-- Video Background -->
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="BMW1.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>
    <div class="fallback-bg">
        <div class="smoke-effect"></div>
    </div>

    <!-- Navigation -->
   <!-- في login.html -->
<nav>
    <div class="logo">PRESTIGE <span>MOTORS</span></div>
    <ul class="nav-links">
        <li><a href="index.html">Accueil</a></li>            <!-- ✅ رجوع للرئيسية -->
        <li><a href="index.html#collection">Collection</a></li>
        <li><a href="register.html">Créer un compte</a></li> <!-- ✅ رابط للتسجيل -->
    </ul>
</nav>

    <!-- Login Form -->
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>CONNEXION</h1>
                <p>Accédez à votre espace</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de Passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-btn">Se Connecter</button>
            </form>

            <div class="divider">
                <span>ou</span>
            </div>

            <p class="register-link">
                Pas encore de compte ? <a href="register.html">Créer un compte</a>
            </p>
        </div>
    </div>

    <script>
        // Loader
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loader').classList.add('hidden');
            }, 1000);
        });

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simple validation
            if(email && password) {
                // Store user info
                localStorage.setItem('userEmail', email);
                localStorage.setItem('isLoggedIn', 'true');
                
                // Redirect to buy page if car selected, else to home
                const selectedCar = localStorage.getItem('selectedCar');
                if(selectedCar) {
                    window.location.href = 'buy.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
